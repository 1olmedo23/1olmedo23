<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="universal">
    <header>
      <div class="header__container">
        <h1><span class="green">Reach out</span> to us</h1>
      </div>
    </header>

    <nav>
      <ul class="nav__links">
        <li>
          <a href="index.html" class="nav__link">Home</a>
        </li>
        <li>
          <a href="capitol.html" class="nav__link">Capitol</a>
        </li>
        <li>
          <a href="cities.html" class="nav__link">Cities</a>
        </li>
        <li>
          <a href="contact.html" class="nav__link">
            <button class="button__nav--link">Contact</button>
          </a>
        </li>
      </ul>
    </nav>

    <div class="main__container">
      <aside class="mainc__aside--container">
        <div class="con__aside-container">
          <h3 class="cap__desc--title">Our Info</h3>
          <ol>
            <li class="con__bullet--points">Phone<br />(***)wastate</li>
            <li class="con__bullet--points">Email<br />@wastate.com</li>
            <li class="con__bullet--points">Facebook<br />WA State</li>
            <li class="con__bullet--points">Twitter<br />@WAState</li>
            <li class="con__bullet--points">Text<br />(***)wastate</li>
          </ol>
        </div>
      </aside>

      <section class="section__container">
        <div class="imgc__main--container">
          <div class="cap__desc--container">
            <div class="cap__img--container">
              <img
                class="cap__img--size"
                src="./contactpic.jpg"
                alt="contact logo"
              />
            </div>
          </div>

          <div class="cap__desc--container">
            <div class="cap__img--container">
              <img
                class="cap__img--size"
                src="./question.png"
                alt="Questions or comments"
              />
            </div>
          </div>
        </div>

        <div class="relative">
          <div class="aside__img--container">
            <img
              class="aside__img--size"
              src="./cursor-click-2-svgrepo-com.png"
              alt="Cursor"
            />
          </div>

          <form
            class="form__main--container"
            action="https://www.google.com"
            target="_blank"
            method="GET"
          >
            <label for="first">First name</label>
            <input
              type="text"
              id="first"
              name="first"
              placeholder="First name"
            />

            <label for="last">Last name</label>
            <input type="text" id="last" name="last" placeholder="Last name" />

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Email" />

            <label for="confirm">Confirm Email</label>
            <input
              type="email"
              id="confirm"
              name="confirm"
              placeholder="Confirm Email"
            /> 
            <p id="emailMatch"></p>

            <script>
              let first = document.getElementById("email");
              let second = document.getElementById("confirm");

              second.addEventListener("input", function () {
                let firstValue = first.value;
                let secondValue = second.value;

                if (firstValue === secondValue) {
                  emailMatch.textContent = "Emails match";
                } else {
                  emailMatch.textContent = "Emails do not match";
                }
              });
            </script>

            <label for="textbox">Questions...</label>

            <textarea
              id="textbox"
              name="textbox"
              placeholder="Questions/Comments"
              rows="5"
              cols="20"
            ></textarea>

            <input class="submit" type="submit" value="Submit" />
          </form>
        </div>
      </section>
    </div>
  </body>
</html>
